name: CI

on:
  push:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  ORG: ${{ github.repository_owner }}
  # true on develop: build only, no push, no manifest bump
  IS_DEVELOP: ${{ github.ref_name == 'develop' }}

jobs:
  build-test-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      security-events: write

    strategy:
      matrix:
        service: [api, notification]
        include:
          - service: api
            context: services/api
          - service: notification
            context: services/notification

    steps:
      # Pin all third-party actions to commit SHAs to prevent supply-chain attacks.
      # Keep updated via: dependabot with package-ecosystem: github-actions
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      - uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        if: env.IS_DEVELOP == 'false'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.context }}/package-lock.json

      - name: Lint + tests
        env:
          SERVICE_CONTEXT: ${{ matrix.context }}
        run: |
          cd "$SERVICE_CONTEXT"
          npm ci
          npm test

      - name: Build & push image
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v5.1.0
        with:
          context: ${{ matrix.context }}
          # develop: build locally only (no push, no registry write)
          push: ${{ env.IS_DEVELOP == 'false' }}
          load: ${{ env.IS_DEVELOP == 'true' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/greenlogistics-${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.ORG }}/greenlogistics-${{ matrix.service }}:latest

      - name: Trivy scan
        uses: aquasecurity/trivy-action@7b7aa264d83dc58691451798b4d117d53d21edfe # v0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.ORG }}/greenlogistics-${{ matrix.service }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Bump image tag in k8s manifests
        if: env.IS_DEVELOP == 'false'
        env:
          SERVICE: ${{ matrix.service }}
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.ORG }}/greenlogistics-${{ matrix.service }}:${{ github.sha }}
          GIT_SHA: ${{ github.sha }}
        run: |
          sed -i "s|image: .*greenlogistics-${SERVICE}:.*|image: ${IMAGE_REF}|" \
            "k8s/${SERVICE}/deployment.yaml"
          git config user.email "ci@greenlogistics.local"
          git config user.name "CI Bot"
          git add "k8s/${SERVICE}/deployment.yaml"
          git diff --cached --quiet || git commit -m "chore: bump ${SERVICE} image to ${GIT_SHA}"
          git push
