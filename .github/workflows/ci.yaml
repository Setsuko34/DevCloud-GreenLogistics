name: CI

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  ORG: ${{ github.repository_owner }}

jobs:
  build-test-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      security-events: write

    strategy:
      matrix:
        service: [api, notification]
        include:
          - service: api
            context: services/api
          - service: notification
            context: services/notification

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.context }}/package-lock.json

      - name: Lint + tests
        run: |
          cd ${{ matrix.context }}
          npm ci
          npm test

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/greenlogistics-${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.ORG }}/greenlogistics-${{ matrix.service }}:latest

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.ORG }}/greenlogistics-${{ matrix.service }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Bump image tag in k8s manifests
        run: |
          sed -i "s|image: .*greenlogistics-${{ matrix.service }}:.*|image: ${{ env.REGISTRY }}/${{ env.ORG }}/greenlogistics-${{ matrix.service }}:${{ github.sha }}|" \
            k8s/${{ matrix.service }}/deployment.yaml
          git config user.email "ci@greenlogistics.local"
          git config user.name "CI Bot"
          git add k8s/${{ matrix.service }}/deployment.yaml
          git diff --cached --quiet || git commit -m "chore: bump ${{ matrix.service }} image to ${{ github.sha }}"
          git push
