version: '3.8'

services:

  # ── Infrastructure ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: greenlogistics
      POSTGRES_USER: gl
      POSTGRES_PASSWORD: gl_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gl -d greenlogistics"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.1.1
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --overprovisioned
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      # Advertise avec le nom du service Docker pour que les clients
      # dans le réseau puissent se reconnecter après le handshake Kafka
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9644/v1/cluster/health_overview | grep -q '\"is_healthy\": true'"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 10s

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # UI → http://localhost:8025

  # ── Services applicatifs ──────────────────────────────────────────────────
  api:
    build:
      context: services/api
      target: builder
    command: sh -c "node_modules/.bin/prisma db push --skip-generate && node dist/index.js"
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://gl:gl_dev@postgres:5432/greenlogistics
      REDIS_URL: redis://redis:6379
      PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  notification:
    build:
      context: services/notification
    environment:
      REDPANDA_BROKERS: redpanda:9092
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      NOTIFICATION_FROM: alerts@greenlogistics.local
    depends_on:
      redpanda:
        condition: service_healthy
      mailhog:
        condition: service_started
    restart: on-failure

  gps:
    build:
      context: services/gps
    environment:
      REDPANDA_BROKERS: redpanda:9092
      REDIS_URL: redis:6379   # go-redis attend host:port sans schéma
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: services/frontend
    ports:
      - "8080:80"
    environment:
      API_URL: http://api:3000
    depends_on:
      - api

volumes:
  postgres_data:
