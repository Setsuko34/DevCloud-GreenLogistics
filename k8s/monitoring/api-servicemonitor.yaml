apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: greenlogistics-api
  namespace: monitoring
  labels:
    release: kps
spec:
  namespaceSelector:
    matchNames:
      - app
  selector:
    matchLabels:
      app: api
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
