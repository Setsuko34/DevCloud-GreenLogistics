apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: app
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ghcr.io/setsuko34/greenlogistics-api:a9868cc8ad4b4db6c6ec048f0a0681b00303c6f3
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: DATABASE_URL
            - name: REDIS_URL
              value: redis://redis.app.svc.cluster.local:6379
            - name: REDPANDA_BROKERS
              value: redpanda.messaging.svc.cluster.local:9093
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
