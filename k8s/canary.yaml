# ── api ──────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-canary
  namespace: app
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
      track: canary
  template:
    metadata:
      labels:
        app: api
        track: canary
    spec:
      containers:
        - name: api
          image: ghcr.io/setsuko34/greenlogistics-api:canary
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: DATABASE_URL
            - name: REDIS_URL
              value: redis://redis.app.svc.cluster.local:6379
            - name: REDPANDA_BROKERS
              value: redpanda.messaging.svc.cluster.local:9092
          livenessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 10
          readinessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 5
          resources:
            requests: { memory: "128Mi", cpu: "100m" }
            limits:   { memory: "256Mi", cpu: "250m" }
---
apiVersion: v1
kind: Service
metadata:
  name: api-canary
  namespace: app
spec:
  selector: { app: api, track: canary }
  ports:
    - { port: 3000, targetPort: 3000 }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-canary
  namespace: app
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-weight: "20"
spec:
  ingressClassName: nginx
  rules:
    - host: api.greenlogistics.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-canary
                port:
                  number: 3000
---
# ── frontend ─────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-canary
  namespace: app
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
      track: canary
  template:
    metadata:
      labels:
        app: frontend
        track: canary
    spec:
      containers:
        - name: frontend
          image: ghcr.io/Auguste-p/greenlogistics-frontend:canary
          ports:
            - containerPort: 80
          resources:
            requests: { memory: "32Mi" }
            limits:   { memory: "64Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-canary
  namespace: app
spec:
  selector: { app: frontend, track: canary }
  ports:
    - { port: 80, targetPort: 80 }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-canary
  namespace: app
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-weight: "20"
spec:
  ingressClassName: nginx
  rules:
    - host: app.greenlogistics.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-canary
                port:
                  number: 80
---
# ── gps (consumer Redpanda — replica ratio) ──────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gps-canary
  namespace: app
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gps
      track: canary
  template:
    metadata:
      labels:
        app: gps
        track: canary
    spec:
      containers:
        - name: gps
          image: ghcr.io/Auguste-p/greenlogistics-gps:canary
          env:
            - name: REDPANDA_BROKERS
              value: redpanda.messaging.svc.cluster.local:9092
            - name: REDIS_URL
              value: redis://redis.app.svc.cluster.local:6379
          resources:
            requests: { memory: "32Mi", cpu: "50m" }
            limits:   { memory: "64Mi", cpu: "100m" }
---
# ── notification (consumer Redpanda — replica ratio) ─────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-canary
  namespace: app
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification
      track: canary
  template:
    metadata:
      labels:
        app: notification
        track: canary
    spec:
      containers:
        - name: notification
          image: ghcr.io/setsuko34/greenlogistics-notification:canary
          env:
            - name: REDPANDA_BROKERS
              value: redpanda.messaging.svc.cluster.local:9092
            - name: SMTP_HOST
              value: mailhog.mail.svc.cluster.local
            - name: SMTP_PORT
              value: "1025"
            - name: NOTIFICATION_FROM
              value: alerts@greenlogistics.local
          resources:
            requests: { memory: "64Mi" }
            limits:   { memory: "128Mi" }
