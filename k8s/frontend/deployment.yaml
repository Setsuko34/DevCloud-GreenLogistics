apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: app
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/setsuko34/greenlogistics-frontend:0a445903669a6d53389d19a2b2b548d183f8c56b
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
            limits:
              memory: "64Mi"
